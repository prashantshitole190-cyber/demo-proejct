services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: medium_clone_db1
      POSTGRES_USER: medium_clone_user1
      POSTGRES_PASSWORD: medium_clone_pass1
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - DATABASE_URL=postgresql://medium_clone_user1:medium_clone_pass1@db:5432/medium_clone_db1
    volumes:
      - ./backend:/app
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data: